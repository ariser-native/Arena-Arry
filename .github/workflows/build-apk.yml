name: Build and Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab on mobile browser!

permissions:
  contents: write # Important for creating a release and uploading assets

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission to gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Arena-Arry-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create or Update GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: latest-apk
        name: Arena Arry - Latest APK
        body: |
          Yahan se direct APK download karein:
          - **app-debug.apk**: Is file ko apne mobile par download aur install karein.
          
          _Build automatically generated by Google AI Studio Build (GitHub Actions)_
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
